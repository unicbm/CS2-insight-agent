<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; background: transparent; overflow: hidden; }

  /* ── 主图标：准星下方 ── */
  #fx-icon-stage {
    position: fixed;
    left: 50%;
    top: 57%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
  }
  /* ── 连杀/残局横幅：画面中上方 ── */
  #fx-banner-stage {
    position: fixed;
    left: 50%;
    top: 18%;
    transform: translateX(-50%);
    pointer-events: none;
  }

  .fx-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    filter: url(#sprayRough) drop-shadow(0 0 1px rgba(0,0,0,.65));
  }
  .fx-item.blue   { color: #2E8BE0; }
  .fx-item.orange { color: #E8761F; }

  .fx-icon-svg { position: relative; }
  .fx-hs-badge {
    position: absolute;
    top: -10px;
    right: -16px;
  }

  .fx-label {
    margin-top: 4px;
    font-family: Impact, "Arial Black", sans-serif;
    font-size: 34px;
    letter-spacing: 4px;
    text-transform: uppercase;
    -webkit-text-stroke: 0.5px rgba(0,0,0,.35);
  }

  .fx-banner-text {
    font-family: Impact, "Arial Black", sans-serif;
    font-size: 84px;
    letter-spacing: 8px;
    text-transform: uppercase;
    white-space: nowrap;
    -webkit-text-stroke: 1px rgba(0,0,0,.35);
  }

  @keyframes fx-stamp {
    0%   { opacity: 0; transform: scale(2.1) rotate(-7deg); }
    55%  { opacity: 1; transform: scale(0.94) rotate(1.5deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  @keyframes fx-fade {
    to { opacity: 0; transform: scale(1.04); }
  }
  .fx-in   { animation: fx-stamp 0.14s ease-out both; }
  .fx-out  { animation: fx-fade 0.28s ease-in both; }

  @keyframes fx-banner-stamp {
    0%   { opacity: 0; transform: scale(2.4); }
    50%  { opacity: 1; transform: scale(0.96); }
    100% { opacity: 1; transform: scale(1); }
  }
  .fx-banner-in  { animation: fx-banner-stamp 0.16s ease-out both; }
</style>
</head>
<body>

<!-- 喷漆质感：粗糙边缘 + 颗粒 -->
<svg width="0" height="0" style="position:absolute">
  <filter id="sprayRough" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.18" numOctaves="3" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="5"/>
  </filter>
</svg>

<div id="fx-icon-stage"></div>
<div id="fx-banner-stage"></div>

<script>
const PORT = location.port || "19871";
const iconStage = document.getElementById("fx-icon-stage");
const bannerStage = document.getElementById("fx-banner-stage");

/* ── 图标 SVG（stencil 风格，currentColor 着色）────────────────────── */
const S = 116; // 图标画布边长
function svgWrap(inner) {
  return `<svg class="fx-icon-svg" width="${S}" height="${S}" viewBox="0 0 100 100"
            fill="none" stroke="currentColor">${inner}</svg>`;
}

const ICONS = {
  // 准星 + 居中弹头（呼应 ONE SHOT, ONE KILL 参考图）
  one_tap: svgWrap(`
    <circle cx="50" cy="50" r="34" stroke-width="7"/>
    <line x1="50" y1="2"  x2="50" y2="20" stroke-width="8"/>
    <line x1="50" y1="80" x2="50" y2="98" stroke-width="8"/>
    <line x1="2"  y1="50" x2="20" y2="50" stroke-width="8"/>
    <line x1="80" y1="50" x2="98" y2="50" stroke-width="8"/>
    <path d="M50 28 L58 44 L58 64 L42 64 L42 44 Z" fill="currentColor" stroke="none"/>
    <rect x="44" y="64" width="12" height="8" fill="currentColor" stroke="none"/>
  `),
  // 环形回旋箭头 + 中央短匕（呼应 REVENGE 参考图）
  revenge: svgWrap(`
    <path d="M78 28 A38 38 0 1 0 88 56" stroke-width="9" stroke-linecap="square"/>
    <path d="M70 12 L84 32 L60 34 Z" fill="currentColor" stroke="none"/>
    <path d="M50 24 L57 40 L57 58 L50 70 L43 58 L43 40 Z" fill="currentColor" stroke="none"/>
    <path d="M30 76 L42 70 L38 82 Z M70 76 L58 70 L62 82 Z M50 74 L46 88 L54 88 Z"
          fill="currentColor" stroke="none"/>
  `),
  first_blood: svgWrap(`
    <path d="M50 6 C50 6 24 40 24 60 C24 76 35 88 50 88 C65 88 76 76 76 60 C76 40 50 6 50 6 Z"
          stroke-width="7"/>
    <path d="M50 34 C50 34 38 50 38 60 C38 68 43 74 50 74 Z" fill="currentColor" stroke="none"/>
    <line x1="20" y1="78" x2="80" y2="36" stroke-width="8"/>
    <path d="M84 26 L78 44 L66 36 Z" fill="currentColor" stroke="none"/>
  `),
  wallbang: svgWrap(`
    <path d="M8 30 H92 M8 50 H92 M8 70 H92" stroke-width="6"/>
    <path d="M36 30 V50 M64 30 V50 M50 50 V70 M22 50 V70 M78 50 V70 M22 10 V30 M50 10 V30 M78 10 V30
             M36 70 V90 M64 70 V90" stroke-width="6"/>
    <circle cx="50" cy="50" r="13" fill="currentColor" stroke="none"/>
    <path d="M50 50 L74 34 M50 50 L70 64 M50 50 L34 70 M50 50 L28 38" stroke-width="5"/>
  `),
  no_scope: svgWrap(`
    <circle cx="50" cy="50" r="33" stroke-width="7"/>
    <line x1="50" y1="10" x2="50" y2="34" stroke-width="6"/>
    <line x1="50" y1="66" x2="50" y2="90" stroke-width="6"/>
    <line x1="10" y1="50" x2="34" y2="50" stroke-width="6"/>
    <line x1="66" y1="50" x2="90" y2="50" stroke-width="6"/>
    <line x1="14" y1="86" x2="86" y2="14" stroke-width="10"/>
  `),
  air_noscope: svgWrap(`
    <circle cx="50" cy="46" r="26" stroke-width="7"/>
    <line x1="50" y1="14" x2="50" y2="32" stroke-width="6"/>
    <line x1="50" y1="60" x2="50" y2="78" stroke-width="6"/>
    <line x1="22" y1="46" x2="38" y2="46" stroke-width="6"/>
    <line x1="62" y1="46" x2="78" y2="46" stroke-width="6"/>
    <line x1="22" y1="74" x2="78" y2="18" stroke-width="9"/>
    <path d="M4 58 Q16 50 28 56 M2 70 Q14 62 26 68 M96 58 Q84 50 72 56 M98 70 Q86 62 74 68"
          stroke-width="5"/>
  `),
  humiliation: svgWrap(`
    <path d="M22 78 L58 30 C64 22 74 18 84 18 C84 28 80 38 72 44 L36 88 Z"
          fill="currentColor" stroke="none"/>
    <path d="M30 64 L14 50 L24 44 L40 52" fill="currentColor" stroke="none"/>
    <circle cx="20" cy="84" r="7" fill="currentColor" stroke="none"/>
  `),
  collateral: svgWrap(`
    <circle cx="32" cy="50" r="15" stroke-width="7"/>
    <circle cx="72" cy="50" r="15" stroke-width="7"/>
    <line x1="2" y1="50" x2="92" y2="50" stroke-width="7"/>
    <path d="M98 50 L84 41 L84 59 Z" fill="currentColor" stroke="none"/>
  `),
  smoke_kill: svgWrap(`
    <path d="M26 66 C14 66 8 56 14 48 C10 38 20 30 30 34 C32 22 48 18 56 28 C68 22 82 30 78 42
             C88 46 88 60 76 64 Z" stroke-width="7"/>
    <circle cx="48" cy="48" r="9" fill="currentColor" stroke="none"/>
    <line x1="48" y1="48" x2="70" y2="30" stroke-width="5"/>
  `),
};

// 爆头角标：小骷髅
const HS_BADGE = `
  <svg class="fx-hs-badge" width="36" height="36" viewBox="0 0 100 100" fill="currentColor">
    <path d="M50 8 C26 8 14 26 14 44 C14 56 20 64 28 70 L28 84 L40 84 L40 92 L60 92 L60 84 L72 84 L72 70
             C80 64 86 56 86 44 C86 26 74 8 50 8 Z" stroke="none"/>
    <circle cx="36" cy="44" r="9" fill="#000"/>
    <circle cx="64" cy="44" r="9" fill="#000"/>
    <path d="M50 54 L56 66 L44 66 Z" fill="#000"/>
  </svg>`;

const ICON_META = {
  one_tap:     { label: "ONE TAP",       color: "blue"   },
  revenge:     { label: "REVENGE",       color: "orange" },
  first_blood: { label: "FIRST BLOOD",   color: "orange" },
  wallbang:    { label: "WALLBANG",      color: "blue"   },
  no_scope:    { label: "NO SCOPE",      color: "blue"   },
  air_noscope: { label: "AIR NO SCOPE",  color: "orange" },
  humiliation: { label: "HUMILIATION",   color: "orange" },
  collateral:  { label: "COLLATERAL",    color: "blue"   },
  smoke_kill:  { label: "SMOKE KILL",    color: "blue"   },
};

const BANNER_META = {
  double: { text: "DOUBLE KILL", color: "blue"   },
  triple: { text: "TRIPLE KILL", color: "blue"   },
  quad:   { text: "QUADRA KILL", color: "orange" },
  ace:    { text: "ACE",         color: "orange" },
};
function bannerMeta(key) {
  if (BANNER_META[key]) return BANNER_META[key];
  const m = /^clutch_(1v\d+)$/.exec(key || "");
  if (m) return { text: `CLUTCH ${m[1].toUpperCase()}`, color: "orange" };
  return null;
}

/* ── 渲染 ──────────────────────────────────────────────────────────── */
const ICON_HOLD_MS = 950, ICON_FADE_MS = 280;
const BANNER_HOLD_MS = 1500, BANNER_FADE_MS = 300;

function spawn(stage, html, cls, holdMs, fadeMs, inCls) {
  stage.replaceChildren();           // 新特效顶掉旧特效，同屏只保留一个
  const el = document.createElement("div");
  el.className = `fx-item ${cls} ${inCls}`;
  el.innerHTML = html;
  stage.appendChild(el);
  setTimeout(() => {
    el.classList.remove(inCls);
    el.classList.add("fx-out");
    setTimeout(() => { if (el.parentNode === stage) el.remove(); }, fadeMs + 60);
  }, holdMs);
}

function fireKill(kill) {
  const iconKey = (kill.icons || [])[0];
  if (iconKey && ICONS[iconKey]) {
    const meta = ICON_META[iconKey];
    const hs = kill.headshot ? HS_BADGE : "";
    const html = `<div style="position:relative">${ICONS[iconKey]}${hs}</div>
                  <div class="fx-label">${meta.label}</div>`;
    spawn(iconStage, html, meta.color, ICON_HOLD_MS, ICON_FADE_MS, "fx-in");
  }
  const bm = bannerMeta(kill.banner);
  if (bm) {
    spawn(bannerStage, `<div class="fx-banner-text">${bm.text}</div>`,
          bm.color, BANNER_HOLD_MS, BANNER_FADE_MS, "fx-banner-in");
  }
}

/* ── 时钟与 WS（与 keyboard.html 同一套同步模型）──────────────────── */
let kills = [], tickRate = 64, startTick = 0, offset = 0;
let running = false, resumeAt = 0, activeMs = 0;
let cursor = 0;
// 超过该窗口仍未触发的击杀视为已错过（晚连接 / 帧率骤降），静默跳过
const FIRE_WINDOW_TICKS = () => Math.max(32, tickRate);

function loadTrack(msg) {
  kills = (msg.kills || []).filter(k => (k.icons || []).length || k.banner);
  kills.sort((a, b) => a.tick - b.tick);
  tickRate = msg.tick_rate || 64;
  startTick = msg.start_tick || 0;
  offset = msg.offset_ticks || 0;
  activeMs = 0;
  running = false;
  cursor = 0;
  iconStage.replaceChildren();
  bannerStage.replaceChildren();
}

function loop() {
  if (running && kills.length) {
    const elapsedMs = activeMs + (performance.now() - resumeAt);
    const cur = startTick + offset + Math.round(elapsedMs / 1000 * tickRate);
    while (cursor < kills.length && kills[cursor].tick <= cur) {
      if (cur - kills[cursor].tick <= FIRE_WINDOW_TICKS()) fireKill(kills[cursor]);
      cursor++;
    }
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function connect() {
  const ws = new WebSocket(`ws://127.0.0.1:${PORT}/ws/kb-overlay`);
  ws.onmessage = ev => {
    const m = JSON.parse(ev.data);
    if (m.type === "load") {
      loadTrack(m);
    } else if (m.type === "resume") {
      if (typeof m.elapsed_ms === "number") activeMs = m.elapsed_ms;
      resumeAt = performance.now();
      running = true;
    } else if (m.type === "pause") {
      if (running) { activeMs += performance.now() - resumeAt; running = false; }
    } else if (m.type === "end") {
      running = false; activeMs = 0;
      iconStage.replaceChildren();
      bannerStage.replaceChildren();
    }
  };
  ws.onclose = () => setTimeout(connect, 1000);
}
connect();
</script>
</body>
</html>
